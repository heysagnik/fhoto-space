name: Face Index Sweep

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger face-index cron route
        run: |
          curl --fail --silent --show-error \
            -X GET \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            https://fhoto-space.vercel.app/api/cron/face-index
